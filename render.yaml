# render.yaml — Deploy ShopEase WMS backend to Render

services:
  - type: web
    name: shopease-wms-backend
    runtime: go
    buildCommand: go build -o bin/server ./cmd/server
    startCommand: ./bin/server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shopease-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: shopease-redis
          type: redis
          property: connectionString
      - key: WMS_JWT_SECRET
        generateValue: true
      - key: WMS_SHOPEASE_SECRET
        generateValue: true
      - key: ENV
        value: production
      - key: PORT
        value: 8081
    healthCheckPath: /health

databases:
  - name: shopease-postgres
    databaseName: shopease_db
    user: shopease

